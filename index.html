<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicon  -->
    <link rel="icon" href="https://assets.science.nasa.gov/dynamicimage/assets/science/esd/eo/images/imagerecords/86000/86257/epicfirstlight_DSC_2015186.jpg?fit=clip&crop=faces%2Cfocalpoint&w=50">
	
    <title>Natural Earth | Aussie Style</title>

	<style>
			:root {
					--bg-light: #ffffff;
					--text-light: #000000;
					--card-bg-light: #f4f4f4;
					--hover-light: #e0e0e0;
			
					--bg-dark: #0e0e0e;
					--text-dark: #ffffff;
					--card-bg-dark: #1a1a1a;
					--hover-dark: #222;
			
					--gold: #ffd700;
					--radius: 12px;
					--transition: all 0.3s ease;
			}
			
			[data-theme="dark"] {
					--bg: var(--bg-dark);
					--text: var(--text-dark);
					--card-bg: var(--card-bg-dark);
					--hover: var(--hover-dark);
			}
			
			[data-theme="light"] {
					--bg: var(--bg-light);
					--text: var(--text-light);
					--card-bg: var(--card-bg-light);
					--hover: var(--hover-light);
			}
			
			* {
					box-sizing: border-box;
					margin: 0;
					padding: 0;
			}
			
			body {
					font-family: 'Segoe UI', sans-serif;
					background-color: var(--bg);
					color: var(--text);
					display: flex;
					align-items: center;
					justify-content: center;
					min-height: 100vh;
					padding: 2rem;
					transition: var(--transition);
			}
			
			.container {
					max-width: 480px;
					width: 100%;
					background-color: var(--card-bg);
					border-radius: var(--radius);
					padding: 2rem;
					box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
					text-align: center;
					transition: var(--transition);
			}
			
			.avatar {
					width: 100px;
					height: 100px;
					border-radius: 50%;
					object-fit: cover;
					margin-bottom: 1rem;
					border: 2px solid var(--gold);
			}
			
			h1 {
					font-size: 1.8rem;
					margin-bottom: 1rem;
			}
			
			.bio {
					font-size: 1rem;
					color: #888;
					margin-bottom: 1.5rem;
			}
			
			.links {
					display: flex;
					flex-direction: column;
					gap: 0.75rem;
					margin-bottom: 2rem;
			}
			
			.link {
					background-color: var(--hover);
					border-radius: var(--radius);
					padding: 0.75rem 1rem;
					text-decoration: none;
					color: var(--text);
					transition: var(--transition);
					font-weight: 500;
			}
			
			.link:hover {
					opacity: 0.8;
			}
			
			.social-icons {
					display: flex;
					justify-content: center;
					gap: 1rem;
			}
			
			.social-icons a {
					color: var(--text);
					transition: var(--transition);
					display: inline-flex;
					align-items: center;
					justify-content: center;
					width: 36px;
					height: 36px;
					border-radius: 50%;
			}
			
			.social-icons a:hover {
					top: 10px;
			}
			
			.social-icons svg {
					width: 36px;
					height: 36px;
					fill: var(--text);
			}
			
			.footer {
					margin-top: 2rem;
					font-size: 0.8rem;
					color: #666;
			}
			
			.credit {
					margin-top: 0.75rem;
					font-size: 0.75rem;
					color: #777;
			}
			
			.credit a {
					color: var(--text);
					text-decoration: underline;
					transition: var(--transition);
			}
			
			.theme-toggle {
					position: absolute;
					top: 1rem;
					right: 1rem;
					background: none;
					border: none;
					color: var(--text);
					font-size: 1.2rem;
					cursor: pointer;
					transition: var(--transition);
			}
			
			.theme-toggle:hover {
					opacity: 0.8;
			}
	</style>
</head>

<body>
    <button class="theme-toggle" id="toggleTheme" title="Toggle dark/light mode"
        aria-label="Toggle dark/light mode">🌓</button>

    <div class="container">

        <div class="credit">
            <a href="https://github.com/cl3bby/natural-earth-aus" target="_blank">View source on GitHub</a>
        </div>
    </div>

    <script>
				// Theme toggle functionality
				const toggle = document.getElementById("toggleTheme");
				const root = document.documentElement;
				
				const storedTheme = localStorage.getItem("theme");
				const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
				
				const theme = storedTheme || (prefersDark ? 'dark' : 'light');
				root.setAttribute("data-theme", theme);
				
				toggle.addEventListener("click", () => {
						const current = root.getAttribute("data-theme");
						const newTheme = current === "dark" ? "light" : "dark";
						root.setAttribute("data-theme", newTheme);
						localStorage.setItem("theme", newTheme);
				});
				
				// Dynamic Year
				document.getElementById("year").textContent = new Date().getFullYear();
    </script>
</body>
